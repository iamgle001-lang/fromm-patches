name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build patches
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build

      - name: Get version
        id: version
        run: echo "version=$(grep '^version=' gradle.properties | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Add DEX to patches
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MPP="patches/build/libs/patches-${VERSION}.mpp"
          BT=$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -1)
          D8="${ANDROID_HOME}/build-tools/${BT}/d8"
          echo "Using d8 from Build Tools ${BT}"
          mkdir -p /tmp/patch_classes /tmp/patch_dex
          unzip -o "$MPP" "*.class" -d /tmp/patch_classes
          JARS=$(find ~/.gradle/caches -name "*.jar" 2>/dev/null | grep -E "patcher|smali|morphe" | head -10)
          CLASSPATH_ARGS=""
          for jar in $JARS; do CLASSPATH_ARGS="$CLASSPATH_ARGS --classpath $jar"; done
          CLASS_FILES=$(find /tmp/patch_classes -name "*.class")
          "$D8" --output /tmp/patch_dex --min-api 26 $CLASSPATH_ARGS $CLASS_FILES 2>/dev/null || \
          "$D8" --output /tmp/patch_dex --min-api 26 $CLASS_FILES 2>/dev/null
          zip "$MPP" -j /tmp/patch_dex/classes.dex
          echo "Added classes.dex to $MPP"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            patches/build/libs/patches-${{ steps.version.outputs.version }}.mpp

      - name: Commit patches to repo and update bundle JSON
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          MPP="patches/build/libs/patches-${VERSION}.mpp"

          # Copy .mpp into repo root for redirect-free raw download
          cp "$MPP" patches-latest.mpp

          # Update patches-bundle.json to use raw GitHub URL (no redirect)
          printf '{\n  "version": "%s",\n  "created_at": "%s",\n  "description": "Patches for fromm fan app (com.knowmerce.fromm.fan)",\n  "download_url": "https://raw.githubusercontent.com/%s/main/patches-latest.mpp"\n}\n' \
            "${VERSION}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${REPO}" > patches-bundle.json

          # Update version field in patches-list.json
          jq --arg v "${VERSION}" '.version = $v' patches-list.json > patches-list.json.tmp && mv patches-list.json.tmp patches-list.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add patches-bundle.json patches-latest.mpp patches-list.json
          git diff --staged --quiet || git commit -m "chore: update patches bundle and metadata for v${VERSION}"
          git pull --rebase origin main
          git push origin main
